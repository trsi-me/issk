# https://render.com/docs/blueprint-spec
# نشر static لـ Flutter Web — البناء محلياً فقط: flutter build web ثم deploy/copy_web.ps1
# (Render لا يشغّل Flutter؛ يقدّم فقط deploy/web)

services:
  - type: web
    name: issk-web
    runtime: static
    rootDir: .
    # يتأكد أن مخرجات الويب كاملة (يشمل ثنائيات SQLite للمتصفح)
    buildCommand: test -f deploy/web/index.html && test -f deploy/web/flutter_bootstrap.js && test -f deploy/web/sqlite3.wasm && test -f deploy/web/sqflite_sw.js
    staticPublishPath: deploy/web
    indexDocument: index.html
    # إن ظل خطأ SQLite/WASM في المتصفح: من لوحة Render > Static Site > Headers أضف لمسار /*:
    #   Cross-Origin-Opener-Policy: same-origin
    #   Cross-Origin-Embedder-Policy: credentialless   (أو require-corp إن لزم)
    # SPA: مسارات مثل /child لا تعطي 404
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
